services:
  postgres:
    image: postgres:16-alpine
    container_name: indosupplier-platform-db-prod
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER:?DB_USER is required}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: ${DB_NAME:?DB_NAME is required}
    volumes:
      - indosupplier_postgres_data:/var/lib/postgresql/data
    networks:
      - indosupplier-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: indosupplier-platform-redis-prod
    env_file:
      - .env
    command: >
      sh -c 'redis-server
      --appendonly yes
      --appendfsync everysec
      --loglevel warning
      $${REDIS_PASSWORD:+--requirepass "$$REDIS_PASSWORD"}'
    volumes:
      - indosupplier_redis_data:/data
    networks:
      - indosupplier-network
    healthcheck:
      test: ["CMD-SHELL", 'redis-cli $${REDIS_PASSWORD:+-a "$$REDIS_PASSWORD"} ping | grep PONG']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: indosupplier-platform-api-prod
    env_file:
      - .env
    ports:
      - "127.0.0.1:${PORT:-8088}:8080"
    environment:
      PORT: 8080
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      STORAGE_UPLOAD_DIR: /app/uploads
    volumes:
      - indosupplier_uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - indosupplier-network

networks:
  indosupplier-network:
    driver: bridge

volumes:
  indosupplier_postgres_data:
  indosupplier_redis_data:
  indosupplier_uploads_data: